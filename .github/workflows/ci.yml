name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_live_evals:
        description: "Also run the live LLM eval harness (needs ANTHROPIC_API_KEY secret; costs money)"
        type: boolean
        default: false

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Import smoke test (no API key required)
        run: |
          python -c "import src.schemas, src.graph.retriever, src.graph.extractor, src.harness, src.agent.loop, src.memory.store, src.server.app, src.llm, evals.runner"

      - name: Offline unit tests
        run: pytest tests/ -v

  live-evals:
    name: live evals (manual)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_live_evals }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run eval harness against the live API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run_evals.py --verbose
